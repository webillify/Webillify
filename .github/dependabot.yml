version: 2
updates:
  - package-ecosystem: npm
    directory: /Webillify-Web-App
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      angular:
        patterns:
          - '@angular/*'
      test-tooling:
        patterns:
          - '@playwright/*'
          - '@axe-core/*'
          - vitest

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

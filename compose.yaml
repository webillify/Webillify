services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: webillify
      POSTGRES_USER: webillify
      POSTGRES_PASSWORD: webillify_local
    ports:
      - '127.0.0.1:5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U webillify -d webillify']
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - webillify-postgres:/var/lib/postgresql/data

volumes:
  webillify-postgres:
